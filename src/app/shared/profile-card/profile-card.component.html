<article class="profile-card card h-100 border-0">
  <div class="avatar">{{ initials }}</div>
  <div class="profile-topline">
    <div>
      <h3>{{ profile.name }}, {{ profile.age }}</h3>
      <p>{{ profile.city }}</p>
    </div>
    <strong>{{ profile.compatibility }}%</strong>
  </div>

  <p>{{ profile.bio }}</p>

  <div class="chips">
    @for (interest of profile.interests.slice(0, 4); track interest) {
      <span>{{ interest }}</span>
    }
  </div>

  <div class="card-actions" aria-label="Acciones del perfil">
    <button class="btn primary full" type="button" (click)="notifyView()">Ver perfil</button>
    <button class="btn ghost full" type="button" (click)="notifyLike()">Like</button>
    <button class="btn ghost full" type="button" (click)="notifyLetter()">Carta</button>
  </div>
</article>

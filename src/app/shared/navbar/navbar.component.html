<header class="navbar">
  <a class="brand" routerLink="/dashboard">
    <span class="brand-mark">CP</span>
    <span>Cita Perfecta</span>
  </a>

  <nav class="nav-links">
    @if (authService.currentUser()) {
      <a routerLink="/dashboard" routerLinkActive="active">Inicio</a>
      <a routerLink="/explore" routerLinkActive="active">Explorar</a>
      <a routerLink="/matches" routerLinkActive="active">Matches</a>
      <a routerLink="/chats" routerLinkActive="active">Chat</a>
      <a routerLink="/ajustes" routerLinkActive="active">Ajustes</a>
      <button class="nav-logout" type="button" (click)="logout()">Salir</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Login</a>
      <a class="nav-cta" routerLink="/register">Crear cuenta</a>
    }
  </nav>
</header>

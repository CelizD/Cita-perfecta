<section class="center-page">
  <div class="glass-card pact-card">
    <span class="eyebrow">Antes de conectar</span>
    <h1>Pacto de Respeto Cita Perfecta</h1>
    <p>Cita Perfecta busca conexiones reales, no coincidencias al azar. Antes de usarla, acepta estas reglas basicas.</p>

    <ol class="pact-list">
      @for (item of pactItems; track item) {
        <li>{{ item }}</li>
      }
    </ol>

    <button class="btn primary full" (click)="accept()">Acepto conectar con respeto</button>
  </div>
</section>

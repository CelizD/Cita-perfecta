<section class="center-page">
  <div class="premium-card glass-card">
    <span class="eyebrow">Plan Premium</span>
    <h1>Cita Perfecta Premium</h1>
    <p>Activa beneficios premium dentro de la sesion local de Cita Perfecta.</p>

    <div class="benefits">
      @for (benefit of premiumService.benefits; track benefit) {
        <div class="benefit">+ {{ benefit }}</div>
      }
    </div>

    @if (authService.currentUser()?.premium) {
      <p class="alert success">Premium activo.</p>
      <a class="btn ghost full" routerLink="/ajustes">Volver a ajustes</a>
    } @else {
      <button class="btn primary full" type="button" (click)="premiumService.activatePremium()">
        Activar Premium
      </button>
    }
  </div>
</section>

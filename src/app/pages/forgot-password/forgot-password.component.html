<section class="auth-layout">
  <div class="auth-copy">
    <span class="eyebrow">Recuperar acceso</span>
    <h1>Restablecer contrasena</h1>
    <p>Escribe tu correo y Supabase enviara un enlace seguro para volver a entrar.</p>
  </div>

  <form class="form-card" [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Correo electronico
      <input type="email" formControlName="email" placeholder="correo@ejemplo.com" autocomplete="email">
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small>Ingresa un correo valido.</small>
      }
    </label>

    @if (message) {
      <p class="alert" [class.success]="success">{{ message }}</p>
    }

    <button class="btn primary full" type="submit" [disabled]="loading">
      {{ loading ? 'Enviando...' : 'Enviar enlace' }}
    </button>

    <p class="form-link">Ya recordaste tu cuenta? <a routerLink="/login">Inicia sesion</a></p>
  </form>
</section>

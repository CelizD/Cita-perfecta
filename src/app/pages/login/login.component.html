<section class="auth-layout">
  <div class="auth-copy">
    <span class="eyebrow">Cita Perfecta</span>
    <h1>Iniciar sesion</h1>
    <p>Entra para ver tu dashboard, completar tu perfil y encontrar conexiones compatibles.</p>
  </div>

  <form class="form-card" [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Correo electronico
      <input type="email" formControlName="email" placeholder="correo@ejemplo.com" autocomplete="email">
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small>Ingresa un correo valido.</small>
      }
    </label>

    <label>
      Contrasena
      <input type="password" formControlName="password" placeholder="Minimo 6 caracteres" autocomplete="current-password">
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <small>La contrasena es obligatoria.</small>
      }
    </label>

    @if (errorMessage) {
      <div class="alert">{{ errorMessage }}</div>
    }

    <button class="btn primary full" type="submit" [disabled]="loading">
      {{ loading ? 'Entrando...' : 'Entrar' }}
    </button>

    <a class="auth-helper-link" routerLink="/recuperar-contrasena">Olvide mi contrasena</a>
    <p class="form-link">No tienes cuenta? <a routerLink="/register">Crear cuenta</a></p>
  </form>
</section>

<section class="auth-layout">
  <div class="auth-copy">
    <span class="eyebrow">Bienvenido de nuevo</span>
    <h1>Iniciar sesion</h1>
    <p>Entra para continuar tu test, ver conexiones compatibles o hablar con tus matches.</p>
  </div>

  <form class="form-card" [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Correo electronico
      <input type="email" formControlName="email" placeholder="correo@ejemplo.com" autocomplete="email">
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small>Ingresa un correo valido.</small>
      }
    </label>

    <label>
      Contrasena
      <input type="password" formControlName="password" placeholder="Tu contrasena" autocomplete="current-password">
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <small>Escribe tu contrasena.</small>
      }
    </label>

    @if (message) {
      <p class="alert">{{ message }}</p>
    }

    <button class="btn primary full" type="submit" [disabled]="loading">
      {{ loading ? 'Entrando...' : 'Entrar' }}
    </button>
    <p class="form-link">No tienes cuenta? <a routerLink="/registro">Crear cuenta</a></p>
  </form>
</section>

<section class="auth-layout">
  <div class="auth-copy">
    <span class="eyebrow">Bienvenido de nuevo</span>
    <h1>Iniciar sesión</h1>
    <p>Entra para continuar tu test, ver conexiones compatibles o hablar con tus matches.</p>
  </div>

  <form class="form-card" [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Correo electrónico
      <input type="email" formControlName="email" placeholder="correo@ejemplo.com">
    </label>

    <label>
      Contraseña
      <input type="password" formControlName="password" placeholder="Tu contraseña">
    </label>

    @if (message) {
      <p class="alert">{{ message }}</p>
    }

    <button class="btn primary full" type="submit">Entrar</button>
    <p class="form-link">¿No tienes cuenta? <a routerLink="/registro">Crear cuenta</a></p>
  </form>
</section>

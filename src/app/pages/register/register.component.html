<section class="auth-layout">
  <div class="auth-copy">
    <span class="eyebrow">Empieza con respeto</span>
    <h1>Crear cuenta</h1>
    <p>Regístrate para completar tu perfil, aceptar el pacto de respeto y responder el test de compatibilidad.</p>
  </div>

  <form class="form-card" [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Nombre
      <input type="text" formControlName="name" placeholder="Daniel Celiz">
      @if (form.controls.name.touched && form.controls.name.invalid) {
        <small>Escribe tu nombre completo.</small>
      }
    </label>

    <label>
      Correo electrónico
      <input type="email" formControlName="email" placeholder="correo@ejemplo.com">
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small>Ingresa un correo válido.</small>
      }
    </label>

    <label>
      Contraseña
      <input type="password" formControlName="password" placeholder="Mínimo 6 caracteres">
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <small>La contraseña debe tener mínimo 6 caracteres.</small>
      }
    </label>

    <label>
      Fecha de nacimiento
      <input type="date" formControlName="birthDate">
      @if (form.controls.birthDate.touched && form.controls.birthDate.invalid) {
        <small>La fecha de nacimiento es obligatoria.</small>
      }
    </label>

    <label class="check-row">
      <input type="checkbox" formControlName="terms">
      <span>Acepto términos, privacidad y usar la app con respeto.</span>
    </label>

    @if (message) {
      <p class="alert">{{ message }}</p>
    }

    <button class="btn primary full" type="submit">Registrarme</button>
    <p class="form-link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </form>
</section>

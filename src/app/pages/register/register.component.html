<section class="auth-layout">
  <div class="auth-copy">
    <span class="eyebrow">Cita Perfecta</span>
    <h1>Crear cuenta</h1>
    <p>Registrate para completar tu perfil, responder el test y empezar a conectar con respeto.</p>
  </div>

  <form class="form-card" [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Correo electronico
      <input type="email" formControlName="email" placeholder="correo@ejemplo.com" autocomplete="email">
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small>Ingresa un correo valido.</small>
      }
    </label>

    <label>
      Contrasena
      <input type="password" formControlName="password" placeholder="Minimo 8 caracteres, mayuscula y numero" autocomplete="new-password">
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <small>Usa minimo 8 caracteres, una mayuscula, una minuscula y un numero.</small>
      }
    </label>

    <label>
      Confirmar contrasena
      <input type="password" formControlName="confirmPassword" placeholder="Repite tu contrasena" autocomplete="new-password">
      @if (form.controls.confirmPassword.touched && form.hasError('passwordsMismatch')) {
        <small>Las contrasenas no coinciden.</small>
      }
    </label>

    @if (errorMessage) {
      <div class="alert">{{ errorMessage }}</div>
    }

    @if (successMessage) {
      <div class="alert success">{{ successMessage }}</div>
    }

    <button class="btn primary full" type="submit" [disabled]="loading || cooldownSeconds > 0">
      {{ submitLabel }}
    </button>

    <p class="form-link">Ya tienes cuenta? <a routerLink="/login">Inicia sesion</a></p>
  </form>
</section>
